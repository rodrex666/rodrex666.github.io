<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rodrigo Silvetti · XR Developer</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Courier New',monospace}
    #c{display:block;width:100vw;height:100vh}
    #hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5}
    #hud-tl{position:absolute;top:18px;left:18px;color:rgba(0,255,255,0.6);font-size:11px;letter-spacing:1.5px;line-height:2}
    #hud-br{position:absolute;bottom:18px;right:18px;color:rgba(0,255,255,0.5);font-size:10px;letter-spacing:1px;text-align:right;line-height:2}
    #controls{position:absolute;bottom:18px;left:18px;color:rgba(0,255,255,0.4);font-size:10px;letter-spacing:1px;line-height:2.1}
    #speed{position:absolute;top:18px;right:18px;color:rgba(0,255,255,0.5);font-size:10px;letter-spacing:1px;text-align:right;line-height:2}
    #crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;pointer-events:none}
    #crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(0,255,255,0.45)}
    #crosshair::before{width:1px;height:20px;left:50%;top:0}
    #crosshair::after{width:20px;height:1px;top:50%;left:0}
    #modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,4,8,0.88);pointer-events:all;z-index:20}
    #modal.open{display:flex}
    #modal-box{width:min(600px,92vw);border:1px solid rgba(0,255,255,0.3);background:rgba(0,6,16,0.98);padding:36px 32px 28px;position:relative;max-height:82vh;overflow-y:auto}
    #modal-box::-webkit-scrollbar{width:4px}
    #modal-box::-webkit-scrollbar-thumb{background:rgba(0,255,255,0.25)}
    #modal-close{position:absolute;top:14px;right:18px;color:#0ff;font-size:20px;cursor:pointer;background:none;border:none;font-family:'Courier New',monospace}
    #modal-close:hover{color:#fff}
    .m-title{color:#0ff;font-size:20px;letter-spacing:3px;margin-bottom:4px;text-transform:uppercase}
    .m-sub{color:rgba(0,255,255,0.45);font-size:10px;letter-spacing:2px;margin-bottom:24px;text-transform:uppercase}
    .m-section{margin-bottom:18px}
    .m-label{color:rgba(0,255,255,0.5);font-size:10px;letter-spacing:2px;margin-bottom:5px;text-transform:uppercase;border-bottom:1px solid rgba(0,255,255,0.1);padding-bottom:4px}
    .m-text{color:rgba(200,240,255,0.82);font-size:13px;line-height:1.85}
    .m-bar-wrap{background:rgba(0,255,255,0.07);height:8px;margin:4px 0 14px;position:relative}
    .m-bar{height:8px;background:linear-gradient(90deg,#0ff,#f0f)}
    .m-bar-label{display:flex;justify-content:space-between;font-size:11px;color:rgba(0,255,255,0.6);margin-bottom:3px}
    .m-project{border:1px solid rgba(0,255,255,0.13);padding:10px 14px;margin-bottom:8px;cursor:pointer;transition:background 0.2s;text-decoration:none;display:block}
    .m-project:hover{background:rgba(0,255,255,0.07);border-color:rgba(0,255,255,0.3)}
    .m-project-title{color:#aff;font-size:13px;margin-bottom:3px}
    .m-project-tag{color:rgba(0,255,255,0.4);font-size:10px;letter-spacing:1px}
    .m-hint{color:rgba(0,255,255,0.28);font-size:10px;letter-spacing:1px;margin-top:14px;text-align:center}
    a{color:#0ff}
    a:hover{color:#fff}
    
    /* CHANGED: Added Bio Photo Style */
    .bio-header { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 20px; }
    .bio-photo { width: 100px; height: 100px; border: 2px solid #0ff; border-radius: 50%; object-fit: cover; box-shadow: 0 0 15px rgba(0,255,255,0.3); }
    .bio-info { flex: 1; }

    #splash{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:30;transition:opacity 0.8s}
    #splash.hide{opacity:0;pointer-events:none}
    #splash-title{color:#0ff;font-size:22px;letter-spacing:6px;margin-bottom:8px}
    #splash-sub{color:rgba(0,255,255,0.45);font-size:11px;letter-spacing:3px;margin-bottom:30px}
    #splash-bar-wrap{width:220px;height:1px;background:rgba(0,255,255,0.12);margin-bottom:8px}
    #splash-bar{height:1px;width:0%;background:#0ff;transition:width 0.12s}
    #splash-status{color:rgba(0,255,255,0.35);font-size:10px;letter-spacing:2px}
    #mobile-controls {
  display: none; /* Hidden on PC */
  position: fixed;
  bottom: 40px;
  right: 40px;
  z-index: 25;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  pointer-events: auto;
}

/* Show only on touch devices */
@media (pointer: coarse) {
  #mobile-controls { display: flex; }
}

.m-btn-row { display: flex; gap: 10px; }

.m-btn {
  width: 60px;
  height: 60px;
  background: rgba(0, 255, 255, 0.1);
  border: 1px solid rgba(0, 255, 255, 0.4);
  color: #0ff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  border-radius: 8px;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.m-btn:active {
  background: rgba(0, 255, 255, 0.3);
  transform: scale(0.95);
}
  </style>
</head>
<body>
<div id="splash">
  <div id="splash-title">RODRIGO SILVETTI</div>
  <div id="splash-sub">XR DEVELOPER · GAME DESIGNER</div>
  <div id="splash-bar-wrap"><div id="splash-bar"></div></div>
  <div id="splash-status">INITIALIZING XR ENVIRONMENT...</div>
</div>
<canvas id="c"></canvas>
<div id="hud">
  <div id="hud-tl">
    XR PORTFOLIO v4.0<br>
    RODRIGO SILVETTI<br>
    <span style="color:rgba(0,255,180,0.7)">● SYSTEM ONLINE</span>
  </div>
  <div id="speed">
    VELOCITY: <span id="vel">0.0</span><br>
    HEADING: <span id="hdg">000°</span>
  </div>
  <div id="controls">
    W — THRUST FORWARD<br>
    S — THRUST BACK<br>
    A — TURN LEFT<br>
    D — TURN RIGHT<br>
    CLICK PLANET — OPEN INFO
  </div>
  <div id="hud-br">
    HAMBURG, GERMANY<br>
    XR DEVELOPER<br>
    GAME DESIGNER
  </div>
  <div id="crosshair"></div>
</div>
<div id="modal">
  <div id="modal-box">
    <button id="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<div id="mobile-controls">
  <div class="m-btn" id="btn-up">▲</div>
  <div class="m-btn-row">
    <div class="m-btn" id="btn-left">◀</div>
    <div class="m-btn" id="btn-down">▼</div>
    <div class="m-btn" id="btn-right">▶</div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
// ── Loading splash ──────────────────────────────────────────────
const splashBar = document.getElementById('splash-bar');
const splashStatus = document.getElementById('splash-status');
const splashEl = document.getElementById('splash');
let prog = 0;
const msgs = ['LOADING ASSETS...','MAPPING PLANETS...','PLACING ORBS...','DOCKING SHIP...','READY'];
let mi = 0;
const splashTimer = setInterval(() => {
  prog += Math.random() * 18;
  if (prog >= 100) { prog = 100; clearInterval(splashTimer); }
  splashBar.style.width = prog + '%';
  splashStatus.textContent = msgs[Math.min(mi++, msgs.length - 1)];
}, 100);
// ── Renderer ─────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const W = () => window.innerWidth;
const H = () => window.innerHeight;
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.setClearColor(0x000408, 1);
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000408, 0.022);
const camera = new THREE.PerspectiveCamera(65, W() / H(), 0.1, 400);
// ── Lights ────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x002244, 3));
const sun = new THREE.DirectionalLight(0x4488ff, 2);
sun.position.set(10, 10, 10);
scene.add(sun);
const ptC = new THREE.PointLight(0x00ffff, 3, 40);
ptC.position.set(0, 0, 0);
scene.add(ptC);
const ptM = new THREE.PointLight(0xff00ff, 2, 40);
ptM.position.set(5, -3, 5);
scene.add(ptM);
// ── Stars ─────────────────────────────────────────────────────────
const sg = new THREE.BufferGeometry();
const sp = new Float32Array(3000 * 3);
for (let i = 0; i < sp.length; i++) sp[i] = (Math.random() - 0.5) * 350;
sg.setAttribute('position', new THREE.BufferAttribute(sp, 3));
scene.add(new THREE.Points(sg, new THREE.PointsMaterial({ color: 0xffffff, size: 0.12, transparent: true, opacity: 0.8 })));
// ── Floating particles ────────────────────────────────────────────
const pg = new THREE.BufferGeometry();
const pp = new Float32Array(500 * 3);
for (let i = 0; i < pp.length; i++) pp[i] = (Math.random() - 0.5) * 100;
pg.setAttribute('position', new THREE.BufferAttribute(pp, 3));
const particles = new THREE.Points(pg, new THREE.PointsMaterial({ color: 0x00ffff, size: 0.05, transparent: true, opacity: 0.35 }));
scene.add(particles);
// ── Grid ──────────────────────────────────────────────────────────
const grid = new THREE.GridHelper(200, 100, 0x003366, 0x001133);
grid.position.y = -8;
grid.material.transparent = true;
grid.material.opacity = 0.28;
scene.add(grid);
// ── Spaceship ─────────────────────────────────────────────────────
const loader = new THREE.GLTFLoader();
const shipGroup = new THREE.Group();
scene.add(shipGroup);
loader.load('Objects/GalacticShip.glb', (gltf) => {
  const model = gltf.scene;
  
  // Optional: Adjust scale or rotation if it looks wrong
  model.scale.set(0.2, 0.2, 0.2); 
  model.rotation.y = Math.PI / 2; 
  
  shipGroup.add(model);
  console.log("Ship loaded successfully!");
}, undefined, (error) => {
  console.error("An error happened loading the ship:", error);
});
const ptShip = new THREE.PointLight(0xffffff, 3, 12);
ptShip.position.set(0, 2, 0);
shipGroup.add(ptShip);



// ── Helpers ───────────────────────────────────────────────────────
function makeTexture(drawFn, w, h) {
  const tc = document.createElement('canvas');
  tc.width = w; tc.height = h;
  drawFn(tc.getContext('2d'), w, h);
  return new THREE.CanvasTexture(tc);
}
// CHANGED: Specific Draw function for small labels above planets
function drawLabel(ctx, w, h, text) {
  ctx.fillStyle = 'rgba(0,0,0,0)'; ctx.fillRect(0,0,w,h);
  ctx.fillStyle = '#0ff'; ctx.font = 'bold 40px Courier New'; ctx.textAlign = 'center';
  ctx.fillText(text.toUpperCase(), w/2, h/2);
}

// ── Planets (Formerly Panels) ─────────────────────────────────────
// CHANGED: Defines radius instead of width/height
const panelDefs = [
  { pos: new THREE.Vector3(0,  3, -35), color: 0x00aaff, edge: 0x00ffff, r: 1.0, id: 'about', label: 'BIO', model: 'Objects/Earth.glb' },
  { pos: new THREE.Vector3(33.3, 3,  -10.8), color: 0xcc00ff, edge: 0xff44ff, r: 0.9, id: 'skills', label: 'SKILLS', model: 'Objects/Saturn.glb' },
  { pos: new THREE.Vector3(20.6, 3,  28.3), color: 0x00ff88, edge: 0x00ff88, r: 0.8, id: 'projects', label: 'WORK', model: 'Objects/Marte.glb' },
  { pos: new THREE.Vector3(-20.6,  3,  28.3), color: 0xffaa00, edge: 0xffcc44, r: 0.6, id: 'contact', label: 'CONTACT', model: 'Objects/Jupiter.glb' },
  { pos: new THREE.Vector3(-33.3, 3, -10.8), color: 0xff4466, edge: 0xff88aa, r: 1.6, id: 'blog', label: 'BLOG', model: 'Objects/Neptune.glb' },
];
const panelGroups = [];
const rayTargets = [];

panelDefs.forEach(pd => {
  const g = new THREE.Group();
  g.position.copy(pd.pos);
  g.userData.panelId = pd.id;
  g.userData.basePosY = pd.pos.y;
  
 
loader.load(pd.model, (gltf) => {
  const model = gltf.scene;
  model.name = "planetModel";
  model.scale.set(pd.r, pd.r, pd.r); // use radius as scale reference
  g.add(model);
});
const planet = new THREE.Mesh(
  new THREE.SphereGeometry(2, 8, 8),
  new THREE.MeshBasicMaterial({ visible: false })
);
g.add(planet);

  rayTargets.push(planet);
  planet.userData.panelId = pd.id;
  
  // Floating Text Label above planet
  const tex = makeTexture((ctx, w, h) => drawLabel(ctx, w, h, pd.label), 256, 128);
  const label = new THREE.Mesh(new THREE.PlaneGeometry(4, 2), new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide }));
  label.name = "planetLabel";
  label.position.y = pd.r + 4.5;
  g.add(label);

  const beacon = new THREE.PointLight(pd.edge, 2, 15);
  g.add(beacon);
  scene.add(g);
  panelGroups.push(g);
});

// ── Input ─────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup',   e => { keys[e.key.toLowerCase()] = false; });
let shipVel = 0, shipAngle = 0;
const ACCEL = 0.007, DECEL = 0.96, MAX_VEL = 0.25, TURN_SPEED = 0.025;
// ── Raycasting ────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
canvas.addEventListener('click', e => {
  if (document.getElementById('modal').classList.contains('open')) return;
  const rect = canvas.getBoundingClientRect();
  mouse.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
  mouse.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(rayTargets);
  if (hits.length > 0) openModal(hits[0].object.userData.panelId);
});
//-For Mobile--------------------------------------------------------
// Mapping UI buttons to existing key logic
const mobileMapping = {
  'btn-up': 'w',
  'btn-down': 's',
  'btn-left': 'a',
  'btn-right': 'd'
};

Object.keys(mobileMapping).forEach(id => {
  const btn = document.getElementById(id);
  const key = mobileMapping[id];

  // When user touches the button
  btn.addEventListener('touchstart', (e) => {
    e.preventDefault(); // Prevents zooming/scrolling while playing
    keys[key] = true;
  });

  // When user lets go
  btn.addEventListener('touchend', (e) => {
    e.preventDefault();
    keys[key] = false;
  });
});


// ── Modal content ─────────────────────────────────────────────────
const modalContents = {
  about: `
    <div class="bio-header">
      <img src="https://via.placeholder.com/150" alt="Rodrigo Silvetti" class="bio-photo">
      <div class="bio-info">
        <div class="m-title">Rodrigo Silvetti</div>
        <div class="m-sub">XR Developer · Game Designer</div>
      </div>
    </div>
    <div class="m-section">
      <div class="m-label">About</div>
      <div class="m-text">I'm Rodri — an XR Developer and Game Designer who loves turning complex ideas into fun experiences. My path started in systems engineering, took a detour through Germany to learn the language, and landed me in Digital Reality with a Master's degree from HAW Hamburg.</div>
    </div>
    <div class="m-section">
      <div class="m-label">Current Focus</div>
      <div class="m-text">Building a hand-tracking VR instrument (Tone Tutor) and rebuilding it in UE5 with gamified music lessons.</div>
    </div>
    <div class="m-section">
      <div class="m-label">Education</div>
      <div class="m-text">
        MSc Digital Reality — HAW Hamburg (2021–2024)<br>
        Electronics Engineering — TUHH Hamburg (2017–2021)<br>
        Systems Engineering — UCB Bolivia (2008–2012)
      </div>
    </div>`,
  skills: `
    <div class="m-title">Skill Matrix</div>
    <div class="m-sub">Technical Capabilities</div>
    ${[['Unreal Engine – Blueprints', 85], ['Unity – C#', 80], ['C++', 70], ['Kotlin', 65]].map(([n, v]) => `
    <div class="m-section">
      <div class="m-bar-label"><span>${n}</span><span>${v}%</span></div>
      <div class="m-bar-wrap"><div class="m-bar" style="width:${v}%"></div></div>
    </div>`).join('')}
    <div class="m-section">
      <div class="m-label">Engines & Tools</div>
      <div class="m-text">Unity · Unreal Engine 5 · Blender · Visual Studio · Android Studio</div>
    </div>`,
  projects: `
    <div class="m-title">Project Log</div>
    <div class="m-sub">XR · Games · 3D Design</div>
    ${[
      ['Tone Tutor', 'XR', 'Hand-tracking VR instrument', 'https://youtube.com/shorts/eY5M2enl538'],
      ['Audio AR', 'HoloLens 2', 'Spatial audio AR experience', 'https://youtu.be/EEGcH3qRcJc'],
      ['Escape Room UE5', 'Games', 'Built in Unreal Engine 5', 'https://youtu.be/2Dp5UlqY9Pw'],
    ].map(([t, tag, desc, url]) => `
    <a class="m-project" href="${url}" target="_blank" rel="noopener">
      <div class="m-project-title">${t}</div>
      <div class="m-project-tag">[${tag}] &mdash; ${desc}</div>
    </a>`).join('')}
    <div class="m-hint">CLICK ANY PROJECT TO WATCH</div>`,
  contact: `
    <div class="m-title">Establish Connection</div>
    <div class="m-sub">Open to collaborations</div>
    <div class="m-section">
      <div class="m-label">Email</div>
      <div class="m-text"><a href="mailto:rodrigo.silvetti@gmail.com">rodrigo.silvetti@gmail.com</a></div>
    </div>
    <div class="m-section">
      <div class="m-label">Instagram</div>
      <div class="m-text"><a href="https://instagram.com/yourhandle" target="_blank">@yourhandle</a></div>
    </div>
    <div class="m-section">
      <div class="m-label">Phone</div>
      <div class="m-text"><a href="tel:+4901756866717">+49 (0) 1756 866717</a></div>
    </div>
    <div class="m-section">
      <div class="m-label">Location</div>
      <div class="m-text">Hamburg, Germany</div>
    </div>`,
    blog: `
    <div class="m-title">Development Blog</div>
    <div class="m-sub">Thoughts on XR & Game Design</div>
    <div class="m-section">
      <div class="m-label">Latest Post</div>
      <div class="m-text">
        <strong style="color:#0ff">Optimizing VR for Standalone Headsets</strong><br>
        A deep dive into draw calls and texture atlas techniques in Unity...
      </div>
    </div>
    <div class="m-section">
      <div class="m-label">Resources</div>
      <div class="m-text">
        <a href="https://yourblog.com" target="_blank">Visit my full blog here →</a>
      </div>
    </div>`
};
function openModal(id) {
  document.getElementById('modal-content').innerHTML = modalContents[id];
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});
window.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
// ── Animation loop ────────────────────────────────────────────────
const velEl = document.getElementById('vel');
const hdgEl = document.getElementById('hdg');
const clock  = new THREE.Clock();
let elapsed = 0;
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  elapsed += dt;
  if (keys['a'] || keys['arrowleft'])  shipAngle += TURN_SPEED;
  if (keys['d'] || keys['arrowright']) shipAngle -= TURN_SPEED;
  if (keys['w'] || keys['arrowup'])    shipVel = Math.min(shipVel + ACCEL, MAX_VEL);
  else if (keys['s'] || keys['arrowdown']) shipVel = Math.max(shipVel - ACCEL, -MAX_VEL * 0.5);
  else shipVel *= DECEL;
  if (Math.abs(shipVel) < 0.0004) shipVel = 0;
  
  const dir = new THREE.Vector3(Math.sin(shipAngle), 0, Math.cos(shipAngle));
  shipGroup.position.addScaledVector(dir, -shipVel);
  shipGroup.rotation.y = shipAngle;

 
  const offset = new THREE.Vector3(0, 1.2, 4.5).applyEuler(new THREE.Euler(0, shipAngle, 0));
  camera.position.lerp(shipGroup.position.clone().add(offset), 0.07);
  camera.lookAt(shipGroup.position.clone().add(new THREE.Vector3(0, 0.25, 0)));
  // CHANGED: Planets rotate and float
  panelGroups.forEach((p, i) => {
    p.position.y = p.userData.basePosY + Math.sin(elapsed * 0.4 + i * 1.6) * 0.4;
   
   // if (p.children[0]){
     // p.children[0].rotation.y += 0.005; // Spin planets
    //}
    // 2. Rotate ONLY the model
  const model = p.getObjectByName("planetModel");
  if (model) {
    model.rotation.y += 0.005; 
  }
    
    // Make labels always face the camera
   // p.children[1].lookAt(camera.position); 
// 3. Make the label face the camera
  const label = p.getObjectByName("planetLabel");
  if (label) {
    // This makes it face the camera perfectly
    label.lookAt(camera.position);
  }

  });
  particles.rotation.y = elapsed * 0.009;
  ptC.intensity = 2.5 + Math.sin(elapsed * 1.6) * 0.6;
  ptM.intensity = 1.8 + Math.cos(elapsed * 2.1) * 0.5;
  velEl.textContent = (Math.abs(shipVel) * 100).toFixed(1);
  hdgEl.textContent = String(Math.round(((shipAngle * 180 / Math.PI) % 360 + 360) % 360)).padStart(3, '0') + '°';
  renderer.render(scene, camera);
}
window.addEventListener('resize', () => {
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(), H());
});
setTimeout(() => {
  splashEl.classList.add('hide');
  setTimeout(() => splashEl.remove(), 900);
  animate();
}, 1400);
</script>
</body>
</html>
